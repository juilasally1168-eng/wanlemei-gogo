<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩了MEI-越南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .toast { transform: translate(-50%, -20px); transition: all 0.3s ease; }
        .toast.show { transform: translate(-50%, 20px); opacity: 1; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col relative bg-slate-50 shadow-2xl pb-24">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white px-4 py-3 sticky top-0 z-40 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-map-location-dot text-xl"></i>
            <h1 class="text-xl font-bold tracking-wide">玩了 MEI 🇻🇳</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="editBadge" class="hidden bg-amber-500 text-xs px-2 py-0.5 rounded-full font-bold animate-pulse text-white">編輯中</span>
            <button id="settingsBtn" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/10 transition-colors">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
        </div>
    </header>

    <!-- 主內容區 -->
    <main id="mainContainer" class="flex-1 p-4">
        <!-- 初始載入歡迎畫面 -->
        <div id="welcomeView" class="text-center py-12">
            <div class="w-32 h-32 bg-teal-100 rounded-full flex items-center justify-center mx-auto mb-4 text-teal-600 text-5xl shadow-inner">
                <i class="fa-solid fa-plane-departure"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">準備好出發了嗎？</h2>
            <p class="text-slate-500 mb-6">點擊下方按鈕載入您的 8 天越南完美行程</p>
            <button onclick="initDefaultSchedule()" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2.5 rounded-xl font-medium shadow-md transition-all active:scale-95">
                載入行程資料
            </button>
        </div>

        <!-- 行程分頁內容 (動態渲染) -->
        <div id="scheduleView" class="hidden space-y-4">
            <!-- 天數切換頁籤 -->
            <div id="dayTabs" class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar snap-x"></div>
            <!-- 當天景點清單 -->
            <div id="poiList" class="space-y-4 mt-2"></div>
        </div>
    </main>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-slate-200 h-16 flex justify-around items-center z-40 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('itinerary')" id="nav-itinerary" class="flex flex-col items-center gap-1 text-teal-600 font-medium">
            <i class="fa-solid fa-calendar-days text-xl"></i>
            <span class="text-xs">行程</span>
        </button>
        <button onclick="switchTab('prep')" id="nav-prep" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <i class="fa-solid fa-clipboard-list text-xl"></i>
            <span class="text-xs">準備清單</span>
        </button>
    </nav>

    <!-- 懸浮新增按鈕 (僅編輯模式顯示) -->
    <button id="fabBtn" class="hidden fixed bottom-20 right-6 w-14 h-14 bg-amber-500 hover:bg-amber-600 text-white rounded-full flex items-center justify-center shadow-lg hover:shadow-xl transition-all active:scale-95 z-50">
        <i class="fa-solid fa-plus text-2xl"></i>
    </button>

    <!-- 密碼與設定彈窗 -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative animate-in fade-in zoom-in-95 duration-200">
            <button id="closeSettingsBtn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-shield-halved text-amber-500"></i>權限驗證
            </h3>
            <div class="space-y-4" id="lockSection">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">請輸入管理者密碼</label>
                    <input type="password" id="pwdInput" placeholder="請輸入密碼解鎖編輯" class="w-full px-3 py-2 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <button onclick="checkPassword()" class="w-full bg-teal-600 text-white py-2.5 rounded-xl font-medium shadow-md">驗證並解鎖</button>
            </div>
            <div class="space-y-4 hidden" id="unlockSection">
                <p class="text-emerald-600 font-medium flex items-center gap-2"><i class="fa-solid fa-circle-check"></i>已進入編輯模式</p>
                <button onclick="lockEditor()" class="w-full bg-slate-600 text-white py-2.5 rounded-xl font-medium">鎖定並退出</button>
            </div>
        </div>
    </document>

    <!-- 提示訊息 -->
    <div id="toast" class="fixed top-0 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-xl text-sm shadow-lg opacity-0 z-50 pointer-events-none transition-all duration-300 flex items-center gap-2"></div>

    <script>
        // 初始化 8 天資料結構，防止空白載入錯誤
        let scheduleData = {
            currentDay: 1,
            isEditable: false,
            days: {
                1: { date: "Day 1", pois: [{ time: "14:00", title: "抵達峴港機場", desc: "辦理入境並前往飯店 check-in" }] },
                2: { date: "Day 2", pois: [{ time: "09:00", title: "美溪沙灘", desc: "享受最美沙灘散步" }] },
                3: { date: "Day 3", pois: [{ time: "08:30", title: "巴拿山一日遊", desc: "黃金佛手橋、纜車體驗" }] },
                4: { date: "Day 4", pois: [{ time: "09:00", title: "和富城漂流", desc: "刺激的水上橡皮艇漂流體驗" }] },
                5: { date: "Day 5", pois: [{ time: "10:00", title: "會安古鎮", desc: "燈籠老街與秋盆河放水燈" }] },
                6: { date: "Day 6", pois: [{ time: "09:00", title: "美山聖地", desc: "探索占婆王國遺址" }] },
                7: { date: "Day 7", pois: [{ time: "15:00", title: "韓市場採買", desc: "購買伴手禮與奧黛體驗" }] },
                8: { date: "Day 8", pois: [{ time: "10:00", title: "收拾行李前往機場", desc: "結束完美的北越/中越之旅" }] }
            }
        };

        // 彈窗控制
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const settingsModal = document.getElementById('settingsModal');

        settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));

        function showToast(msg, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.innerHTML = isSuccess ? `<i class="fa-solid fa-circle-check text-emerald-400"></i> ${msg}` : `<i class="fa-solid fa-circle-xmark text-rose-400"></i> ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function initDefaultSchedule() {
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('scheduleView').classList.remove('hidden');
            renderTabs();
            renderPois();
            showToast("成功載入 8 天行程！");
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('dayTabs');
            tabsContainer.innerHTML = '';
            Object.keys(scheduleData.days).forEach(day => {
                const isActive = scheduleData.currentDay == day;
                const btn = document.createElement('button');
                btn.className = `snap-center shrink-0 px-4 py-2 rounded-xl text-sm font-bold transition-all ${isActive ? 'bg-teal-600 text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100'}`;
                btn.innerText = `第 ${day} 天`;
                btn.onclick = () => {
                    scheduleData.currentDay = day;
                    renderTabs();
                    renderPois();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderPois() {
            const poiContainer = document.getElementById('poiList');
            poiContainer.innerHTML = '';
            const pois = scheduleData.days[scheduleData.currentDay].pois;
            
            if(pois.length === 0) {
                poiContainer.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">今天還沒有安排景點喔</div>`;
                return;
            }

            pois.forEach((poi, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4 relative group";
                card.innerHTML = `
                    <div class="text-teal-600 font-bold text-sm pt-0.5">${poi.time}</div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 text-base">${poi.title}</h4>
                        <p class="text-slate-500 text-sm mt-1">${poi.desc}</p>
                    </div>
                `;
                poiContainer.appendChild(card);
            });
        }

        function checkPassword() {
            const pwd = document.getElementById('pwdInput').value;
            if(pwd === 'meigo2026') {
                scheduleData.isEditable = true;
                document.getElementById('lockSection').classList.add('hidden');
                document.getElementById('unlockSection').classList.remove('hidden');
                document.getElementById('editBadge').classList.remove('hidden');
                document.getElementById('fabBtn').classList.remove('hidden');
                showToast("密碼正確，已解鎖編輯權限！");
                setTimeout(() => settingsModal.classList.add('hidden'), 1000);
            } else {
                showToast("密碼錯誤，請再試一次", false);
            }
        }

        function lockEditor() {
            scheduleData.isEditable = false;
            document.getElementById('lockSection').classList.remove('hidden');
            document.getElementById('unlockSection').classList.add('hidden');
            document.getElementById('editBadge').classList.add('hidden');
            document.getElementById('fabBtn').classList.add('hidden');
            document.getElementById('pwdInput').value = '';
            showToast("已安全登出並鎖定");
        }

        function switchTab(type) {
            showToast("功能正常切換中");
        }
    </script>
</body>
</html>
